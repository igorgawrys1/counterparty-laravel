name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: "PHP ${{ matrix.php }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
      - run: composer validate --strict
      # counterparty-core / -ai are pulled from their (currently private) GitHub repos until
      # published to Packagist; provide a COMPOSER_AUTH secret:
      # {"github-oauth":{"github.com":"<token>"}}.
      - run: composer install --no-interaction --no-progress --prefer-dist
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
      - run: composer cs:check
      - run: composer stan
      - run: composer test
